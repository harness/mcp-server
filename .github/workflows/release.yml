name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm docs:check

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PKG_VERSION" = "$TAG_VERSION" || {
            echo "package.json version $PKG_VERSION does not match tag $GITHUB_REF_NAME"
            exit 1
          }

      - name: Publish to npm
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "Package $PKG_NAME@$PKG_VERSION already exists on npm; skipping publish."
            exit 0
          fi

          if npm publish; then
            exit 0
          fi

          echo "npm publish failed; rechecking npm in case another run published first."
          npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release $GITHUB_REF_NAME already exists; skipping create."
            exit 0
          fi

          if gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes; then
            exit 0
          fi

          echo "GitHub release create failed; rechecking GitHub in case another run created it first."
          gh release view "$GITHUB_REF_NAME" >/dev/null
