name: Sync Harness Schemas

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check schema coverage
        run: node scripts/check-schema-coverage.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run sync script
        run: node scripts/sync-schemas.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-sync harness schemas"
          title: "chore: auto-sync harness schemas"
          body: |
            Automated schema synchronization from `harness/harness-schema`.

            This PR updates both v0 and v1 JSON schemas used by the MCP server to match the latest definitions upstream.
          branch: chore/sync-schemas
          delete-branch: true
          labels: dependencies, schemas
