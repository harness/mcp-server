apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-mcp-server
  namespace: harness-mcp
  labels:
    app.kubernetes.io/name: harness-mcp-server
spec:
  # MCP sessions are held in an in-memory Map per pod (see src/index.ts). A
  # session initialized on one pod is unknown to any other, so a request
  # load-balanced to a different replica returns "Session not found", forcing
  # the client to re-initialize / re-authenticate. Until the session store is
  # externalized (e.g. shared store + SDK eventStore for resumability), run a
  # single replica. If you must scale out, you MUST also add sticky routing
  # (Service sessionAffinity: ClientIP below is not sufficient through an
  # L7 ingress — configure sticky sessions at the ingress too).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harness-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harness-mcp-server
    spec:
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: harness-mcp-server
          image: harness-mcp-server:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: harness-mcp-secret
            - configMapRef:
                name: harness-mcp-config
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 3
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
