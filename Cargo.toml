[workspace]
members = [
    "crates/harness-mcp-server",
    "crates/harness-mcp-core",
    "crates/harness-mcp-tools",
    "crates/harness-mcp-auth",
    "crates/harness-mcp-client",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Harness Inc."]
license = "Apache-2.0"
repository = "https://github.com/harness/mcp-server"
homepage = "https://harness.io"
description = "Harness MCP Server - Model Context Protocol server for Harness platform integration"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-util = "0.7"

# HTTP server and client
axum = { version = "0.7", features = ["macros", "ws"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# CLI
clap = { version = "4.0", features = ["derive", "env"] }

# Configuration
config = "0.14"
dotenvy = "0.15"

# Crypto and auth
jsonwebtoken = "9.0"
uuid = { version = "1.0", features = ["v4", "serde"] }

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# WebSocket support
tokio-tungstenite = "0.21"

# HTTP utilities
hyper = "1.0"
http = "1.0"

# Utilities
futures = "0.3"
bytes = "1.0"
url = "2.0"

# Testing
mockito = "1.0"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
debug = true