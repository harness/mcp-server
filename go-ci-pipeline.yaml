# Go CI Pipeline — example YAML for BuildAndPushDockerRegistry step
# Shows both Harness Artifact Registry (HAR) and third-party registry configurations.
# The two configurations are mutually exclusive — use exactly one.

# =============================================================================
# OPTION A: Harness Artifact Registry (HAR)
# Use when the user says "Harness Artifact Registry" or "HAR".
# Key: uses registryRef (NOT connectorRef). No Docker connector needed.
# =============================================================================
# pipeline:
#   name: Go App CI
#   identifier: go_app_ci
#   projectIdentifier: PM_Signoff
#   orgIdentifier: default
#   tags: {}
#   properties:
#     ci:
#       codebase:
#         connectorRef: <+input>
#         build:
#           type: branch
#           spec:
#             branch: <+input>
#   stages:
#     - stage:
#         name: Build and Push
#         identifier: build_and_push
#         type: CI
#         spec:
#           cloneCodebase: true
#           caching:
#             enabled: true
#           platform:
#             os: Linux
#             arch: Amd64
#           runtime:
#             type: Cloud
#             spec: {}
#           execution:
#             steps:
#               - step:
#                   type: Run
#                   name: Go Build
#                   identifier: go_build
#                   spec:
#                     connectorRef: account.harnessImage
#                     image: golang:1.22
#                     shell: Bash
#                     command: |
#                       go mod download
#                       go build -o app ./...
#               - step:
#                   type: Run
#                   name: Go Test
#                   identifier: go_test
#                   spec:
#                     connectorRef: account.harnessImage
#                     image: golang:1.22
#                     shell: Bash
#                     command: |
#                       go test -v ./...
#               - step:
#                   type: BuildAndPushDockerRegistry
#                   name: Build and Push to Harness Artifact Registry
#                   identifier: build_and_push_har
#                   spec:
#                     repo: <+input>
#                     tags:
#                       - latest
#                       - <+pipeline.sequenceId>
#                     caching: true
#                     registryRef: <+input>
#   description: CI pipeline — builds Go app, runs tests, pushes image to Harness Artifact Registry.

# =============================================================================
# OPTION B: Third-party registry (DockerHub, ECR, GCR, ACR, etc.)
# Use when the user specifies any non-Harness registry.
# Key: uses connectorRef (NOT registryRef). Requires a Docker connector.
# =============================================================================
pipeline:
  name: Go CI Pipeline
  identifier: go_ci_pipeline
  projectIdentifier: default
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: <+input>
        build:
          type: branch
          spec:
            branch: <+input>
  stages:
    - stage:
        name: Build and Push
        identifier: build_and_push
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Go Build
                  identifier: go_build
                  spec:
                    connectorRef: account.harnessImage
                    image: golang:1.22
                    shell: Bash
                    command: |
                      go mod download
                      go build -o app ./...
              - step:
                  type: Run
                  name: Go Test
                  identifier: go_test
                  spec:
                    connectorRef: account.harnessImage
                    image: golang:1.22
                    shell: Bash
                    command: |
                      go test -v ./...
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push Docker Image
                  identifier: build_and_push_docker
                  spec:
                    connectorRef: <+input>
                    repo: <+input>
                    tags:
                      - latest
                      - <+pipeline.sequenceId>
                    caching: true
  description: CI pipeline — Go build, unit tests, Docker push to third-party registry.
